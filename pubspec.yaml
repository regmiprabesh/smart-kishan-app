name: smart_kishan
description: A new Flutter project.

# Prevent accidental publishing to pub.dev.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.4.3 <4.0.0"

dependencies:
  cached_network_image: ^3.3.1
  carousel_slider: ^5.0.0
  collection: ^1.16.0
  connectivity_plus: ^7.0.0
  cupertino_icons: ^1.0.5
  dropdown_button2: ^2.1.4
  file_picker: ^10.3.6
  firebase_auth: ^6.1.4
  firebase_core: ^4.4.0
  firebase_messaging: ^16.1.1
  fl_chart: ^1.1.1
  flutter:
    sdk: flutter
  flutter_cached_pdfview: ^0.4.3
  flutter_html: ^3.0.0-beta.2
  flutter_image_compress: ^2.3.0
  flutter_image_stack: ^0.0.7
  flutter_localizations:
    sdk: flutter
  flutter_map: ^8.2.2
  flutter_overlay_loader: ^2.0.0
  flutter_secure_storage: ^10.0.0
  font_awesome_flutter: ^10.7.0
  geocoding: ^4.0.0
  geolocator: ^14.0.2
  get: ^4.6.6
  gpt_markdown: ^1.1.7
  http: ^1.2.2
  hugeicons: ^1.1.5
  image_cropper: ^11.0.0
  image_picker: ^1.0.2
  intl: ^0.20.2
  introduction_screen: ^4.0.0
  latlng: ^2.0.7
  lottie: ^3.1.3
  path_provider: ^2.1.0
  pinput: ^6.0.2
  shared_preferences: ^2.2.0
  shimmer: ^3.0.0
  sqflite: ^2.2.8+4
  timeline_tile: ^2.0.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # Enable generation of localized Strings from arb files.
  generate: true

  assets:
    # Add assets from the images directory to the application.
    - assets/images/
    - assets/images/vendor/
    - assets/animations/weather/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Italic.ttf
          style: italic
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 800
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
